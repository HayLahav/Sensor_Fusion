run_id: null  # auto-generated from timestamp if null

video:
  source: "data/sample_videos/clip.mp4"
  max_frames: null  # null = process entire video
  resize_hw: [480, 640]  # [H, W] resize before detection

detection:
  checkpoint: "ckpt/wilddet3d_alldata_all_prompt_v1.0.pt"
  prompts: ["car", "person", "cyclist"]
  score_threshold: 0.4
  fp16: true
  device: "cuda"

tracking:
  backend: "kalman_cow"          # "cowtracker" | "kalman_cow"
  window_size: 8
  max_tracks: 50
  device: "cuda"

  # KalmanCoWTracker-specific
  lost_patience: 30              # frames before deleting a LOST track
  confirm_age: 3                 # TENTATIVE frames needed to become CONFIRMED
  high_score_threshold: 0.5      # ByteTrack: associate + init new tracks
  low_score_threshold: 0.2       # ByteTrack: associate with existing only
  assignment_cost_threshold: 0.5  # maximum blended cost accepted by Hungarian solver
  alpha_cost: 0.35               # blend: α·IoU_cost + (1−α)·CoW_cost; falls back to IoU-only when CoW unavailable
  cow_conf_threshold: 0.85       # CoWTracker visibility gate
  min_cow_points: 4              # min surviving points to use CoW measurement
  velocity_decay: 0.9            # γ^k velocity decay for LOST tracks
  depth_alpha: 0.005             # depth-aware measurement noise (z in metres): σ_z = depth_alpha·z² + depth_beta
  depth_beta: 0.5
  sigma_xy_base: 0.5             # lateral/vertical base noise (metres)
  sigma_xy_slope: 0.01           # scales with depth
  lazy_cow_innovation: 0.3       # skip CoW if ||ν|| below this threshold
  ego_motion: true               # enable ORB homography compensation
  mahal_threshold: 9.21          # χ²(0.99, df=4) gate before Hungarian
  # legacy CoWTrackerWrapper params (still used if backend="cowtracker")
  occlusion_tolerance: 10
  nn_threshold: 50.0

occupancy:
  resolution: 0.5             # meters per BEV cell
  x_range: [-20.0, 20.0]     # lateral range in meters
  z_range: [0.0, 50.0]       # forward range in meters
  decay_factor: 0.95          # per-frame exponential decay
  lidar_confidence: 0.6    # LiDAR-only cell confidence level

reasoning:
  enabled: true
  interval_frames: 30         # run Gemma every N frames
  visual_mode: false          # true = send annotated frame to Gemma
  model_id: "google/gemma-4-2b-it"
  quantize_4bit: true
  max_new_tokens: 256
  device: "cuda"

output:
  base_dir: "outputs"
  flush_interval: 100         # write JSON every N frames
  save_video: true
  video_fps: null             # null = match input fps

logging:
  level: "INFO"
  log_file: null
  use_rich: true
